$kind: http-request
name: Create Group
method: POST
url: 'http://localhost:8080/api/groups'
order: 1000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
body:
  type: json
  content: |-
    {
      "groupCode": "GROUP-001",
      "groupName": "Nhóm Test 01",
      "lecturerId": 1,
      "studentIds": []
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 201", function() {
        pm.response.to.have.status(201);
      });
      pm.test("Success true", function() {
        pm.expect(pm.response.json().success).to.be.true;
      });
      var json = pm.response.json();
      if (json.data && json.data.id) {
        pm.collectionVariables.set("groupId", json.data.id);
      }
